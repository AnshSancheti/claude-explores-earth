# fly.toml app configuration file generated for claude-explores-earth on 2025-08-19T06:13:14Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claude-explores-earth'
primary_region = 'ewr'
kill_signal = 'SIGTERM'
kill_timeout = '150s'

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  WORKER_BOOT_TIMEOUT_MS = "300000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[mounts]
  source = "exploration_data"
  destination = "/data"

[[vm]]
  memory = '4gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
